
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辦公室訂餐小幫手</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .animate-bounce-short { animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%) translateX(-50%); } 50% { transform: translateY(0) translateX(-50%); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- 重要：請在這裡替換成你的 Firebase Config ---
        const firebaseConfig = {
           apiKey: "AIzaSyBV3Xc4s32gMeDRA1euwDBJ3qz2t0rLiAY",
  authDomain: "order-c3529.firebaseapp.com",
  projectId: "order-c3529",
  storageBucket: "order-c3529.firebasestorage.app",
  messagingSenderId: "700659521697",
  appId: "1:700659521697:web:e94b9f712409e4c57c38e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "office-lunch-order-structured"; 

        window.fb = { auth, db, appId, collection, doc, setDoc, onSnapshot, addDoc, updateDoc, deleteDoc, writeBatch, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 內嵌 SVG 圖示組件，解決 ReferenceError 問題 ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                ShoppingCart: <path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7M2 7v11a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7M2 7h20M16 11a4 4 0 0 1-8 0" />,
                CheckCircle: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></>,
                Clock: <><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></>,
                Trash2: <><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></>,
                DollarSign: <><line x1="12" y1="1" x2="12" y2="23" /><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" /></>,
                Plus: <><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></>,
                LayoutDashboard: <><rect width="7" height="9" x="3" y="3" rx="1" /><rect width="7" height="5" x="14" y="3" rx="1" /><rect width="7" height="9" x="14" y="12" rx="1" /><rect width="7" height="5" x="3" y="16" rx="1" /></>,
                ChevronLeft: <polyline points="15 18 9 12 15 6" />,
                Timer: <><line x1="10" y1="2" x2="14" y2="2" /><line x1="12" y1="14" x2="15" y2="11" /><circle cx="12" cy="14" r="8" /></>,
                AlertCircle: <><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></>,
                Camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" /><circle cx="12" cy="13" r="3" /></>,
                Upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></>,
                Loader2: <path d="M21 12a9 9 0 1 1-6.219-8.56" />,
                ListChecks: <><path d="m3 17 2 2 4-4" /><path d="m3 7 2 2 4-4" /><path d="M13 6h8" /><path d="M13 12h8" /><path d="M13 18h8" /></>,
                Utensils: <><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2" /><path d="M7 2v20" /><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" /></>,
                Coffee: <><path d="M17 8h1a4 4 0 1 1 0 8h-1" /><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z" /><line x1="6" y1="2" x2="6" y2="4" /><line x1="10" y1="2" x2="10" y2="4" /><line x1="14" y1="2" x2="14" y2="4" /></>,
                RefreshCw: <><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" /><path d="M21 3v5h-5" /><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" /><path d="M3 21v-5h5" /></>
            };
            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [settings, setSettings] = useState({ deadline: null });
            const [bentoImage, setBentoImage] = useState(null);
            const [drinkImage, setDrinkImage] = useState(null);
            const [view, setView] = useState('order'); 
            const [adminTab, setAdminTab] = useState('orders');
            const [loading, setLoading] = useState(true);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [message, setMessage] = useState(null);

            // 表單狀態
            const [customerName, setCustomerName] = useState('');
            const [bentoName, setBentoName] = useState('');
            const [bentoPrice, setBentoPrice] = useState('');
            const [drinkName, setDrinkName] = useState('');
            const [drinkPrice, setDrinkPrice] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [uploadingType, setUploadingType] = useState(null);
            const [deadlineInput, setDeadlineInput] = useState('');

            const bentoInputRef = useRef(null);
            const drinkInputRef = useRef(null);

            const showMsg = (text, type = 'success') => {
                setMessage({ text, type });
                setTimeout(() => setMessage(null), 3000);
            };

            useEffect(() => {
                if (!window.fb) return;
                const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                signInAnonymously(auth).catch(err => showMsg("Firebase 連線失敗", 'error'));
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, appId, collection, doc, onSnapshot } = window.fb;

                const unsubOrders = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), (s) => {
                    setOrders(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const unsubSettings = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), (s) => {
                    if (s.exists()) setSettings(s.data());
                });

                const unsubBentoImg = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'bento_menu'), (s) => {
                    if (s.exists()) setBentoImage(s.data().image);
                });

                const unsubDrinkImg = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'drink_menu'), (s) => {
                    if (s.exists()) setDrinkImage(s.data().image);
                    setLoading(false);
                });

                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => { unsubOrders(); unsubSettings(); unsubBentoImg(); unsubDrinkImg(); clearInterval(timer); };
            }, [user]);

            const isDeadlinePassed = useMemo(() => {
                if (!settings.deadline) return false;
                const deadlineDate = new Date(settings.deadline);
                const now = currentTime;
                // 只在當天生效
                if (deadlineDate.toDateString() !== now.toDateString()) return false;
                return now.getTime() > settings.deadline;
            }, [settings.deadline, currentTime]);

            const timeLeft = useMemo(() => {
                if (!settings.deadline || isDeadlinePassed) return null;
                const deadlineDate = new Date(settings.deadline);
                if (deadlineDate.toDateString() !== currentTime.toDateString()) return null;
                const diff = settings.deadline - currentTime.getTime();
                const mins = Math.floor(diff / 60000);
                const secs = Math.floor((diff % 60000) / 1000);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }, [settings.deadline, currentTime, isDeadlinePassed]);

            const compressImage = (file, maxWidth = 1000, quality = 0.5) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let w = img.width, h = img.height;
                            if (w > maxWidth) { h = (maxWidth / w) * h; w = maxWidth; }
                            canvas.width = w; canvas.height = h;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, w, h);
                            resolve(canvas.toDataURL('image/jpeg', quality));
                        };
                    };
                });
            };

            const handleImageUpload = async (e, type) => {
                const file = e.target.files[0];
                if (!file || !window.fb) return;
                setUploadingType(type);
                try {
                    const compressed = await compressImage(file);
                    const { db, appId, doc, setDoc } = window.fb;
                    const docName = type === 'bento' ? 'bento_menu' : 'drink_menu';
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', docName), { image: compressed, updatedAt: Date.now() });
                    showMsg("菜單更新成功！");
                } catch (err) { showMsg("上傳失敗", 'error'); }
                setUploadingType(null);
            };

            const handleSubmitOrder = async (e) => {
                e.preventDefault();
                if (isDeadlinePassed) { showMsg("訂餐已截止囉！", 'error'); return; }
                if (!customerName || (!bentoName && !drinkName)) { showMsg("請填寫姓名與品項", 'error'); return; }
                setIsSubmitting(true);
                try {
                    const { db, appId, collection, addDoc } = window.fb;
                    const bP = Number(bentoPrice) || 0, dP = Number(drinkPrice) || 0;
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), {
                        name: customerName, bento: bentoName, bentoPrice: bP,
                        drink: drinkName, drinkPrice: dP, total: bP + dP,
                        paid: false, timestamp: Date.now()
                    });
                    setBentoName(''); setBentoPrice(''); setDrinkName(''); setDrinkPrice('');
                    showMsg("下單成功！");
                } catch (err) { showMsg("提交失敗", 'error'); }
                setIsSubmitting(false);
            };

            const stats = useMemo(() => {
                let bt = 0, dt = 0, ps = 0;
                const bc = {}, dc = {};
                orders.forEach(o => {
                    bt += (o.bentoPrice || 0); dt += (o.drinkPrice || 0);
                    if (o.paid) ps += (o.total || 0);
                    if (o.bento) bc[o.bento] = (bc[o.bento] || 0) + 1;
                    if (o.drink) dc[o.drink] = (dc[o.drink] || 0) + 1;
                });
                return { bt, dt, ot: bt + dt, ps, bc, dc, count: orders.length };
            }, [orders]);

            const deleteOrder = async (id) => {
                if (!window.fb || !confirm("確定要刪除這筆訂單嗎？")) return;
                const { db, appId, doc, deleteDoc } = window.fb;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', id));
                showMsg("已刪除訂單");
            };

            const resetDay = async () => {
                if (!window.fb || !confirm("確定要重置今天所有訂單嗎？")) return;
                const { db, appId, doc, writeBatch } = window.fb;
                const batch = writeBatch(db);
                orders.forEach(o => {
                    batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'orders', o.id));
                });
                await batch.commit();
                showMsg("今日已重置");
            };

            if (loading) return <div className="h-screen flex flex-col items-center justify-center font-bold text-slate-400 gap-4"><Icon name="Loader2" size={40} className="animate-spin text-orange-500" />載入雲端系統中...</div>;

            return (
                <div className="min-h-screen pb-20 bg-slate-50">
                    {message && (
                        <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-2xl shadow-2xl font-bold flex items-center gap-2 animate-bounce-short ${message.type === 'error' ? 'bg-red-500 text-white' : 'bg-slate-900 text-white'}`}>
                            <Icon name={message.type === 'error' ? "AlertCircle" : "CheckCircle"} size={18}/>
                            {message.text}
                        </div>
                    )}

                    <header className="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
                        <div className="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="bg-orange-500 p-2 rounded-xl text-white"><Icon name="ShoppingCart" /></div>
                                <h1 className="font-black text-xl tracking-tight">訂餐小幫手</h1>
                            </div>
                            <button onClick={() => setView(view === 'order' ? 'admin' : 'order')} className="flex items-center gap-2 bg-slate-100 px-5 py-2.5 rounded-full text-sm font-bold transition-all hover:bg-slate-200">
                                {view === 'order' ? <><Icon name="LayoutDashboard" size={18}/> 後台統計</> : <><Icon name="ChevronLeft" size={18}/> 返回首頁</>}
                            </button>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 mt-4">
                        {view === 'order' ? (
                            <div className="space-y-8">
                                {timeLeft && (
                                    <div className="bg-orange-50 border border-orange-100 p-4 rounded-3xl flex items-center justify-center gap-3 text-orange-700 font-bold">
                                        <Icon name="Timer" className="animate-pulse" />
                                        今日訂餐截止倒數：<span className="text-xl font-black">{timeLeft}</span>
                                    </div>
                                )}

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="bg-white p-2 rounded-3xl border border-slate-200 shadow-sm">
                                        <div className="text-center py-2 text-orange-600 font-black text-xs">🍱 便當菜單</div>
                                        {bentoImage ? <img src={bentoImage} className="w-full rounded-2xl border border-slate-50" /> : <div className="py-20 text-center text-slate-300 italic text-xs">主揪尚未上傳照片</div>}
                                    </div>
                                    <div className="bg-white p-2 rounded-3xl border border-slate-200 shadow-sm">
                                        <div className="text-center py-2 text-teal-600 font-black text-xs">🥤 飲料菜單</div>
                                        {drinkImage ? <img src={drinkImage} className="w-full rounded-2xl border border-slate-50" /> : <div className="py-20 text-center text-slate-300 italic text-xs">主揪尚未上傳照片</div>}
                                    </div>
                                </div>

                                <section className={`bg-white p-8 rounded-[2rem] shadow-xl border transition-all ${isDeadlinePassed ? 'opacity-60 grayscale border-red-100' : 'border-white'}`}>
                                    <h2 className="text-xl font-black mb-8 flex items-center gap-2 text-slate-800">
                                        {isDeadlinePassed ? <Icon name="AlertCircle" className="text-red-500"/> : <Icon name="Plus" className="text-orange-500"/>}
                                        {isDeadlinePassed ? "今日訂餐已截止" : "我要點餐"}
                                    </h2>
                                    <form onSubmit={handleSubmitOrder} className="space-y-8">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">您的姓名</label>
                                            <input disabled={isDeadlinePassed} required value={customerName} onChange={e => setCustomerName(e.target.value)} placeholder="例如：王小明" className="w-full text-2xl font-black bg-slate-50 rounded-2xl px-6 py-5 outline-none focus:ring-4 focus:ring-orange-100 transition-all"/>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <div className="space-y-4">
                                                <h3 className="font-black text-orange-600 text-sm flex items-center gap-2"><Icon name="Utensils" size={16}/> 便當</h3>
                                                <input disabled={isDeadlinePassed} value={bentoName} onChange={e => setBentoName(e.target.value)} placeholder="品項名稱" className="w-full bg-slate-50 rounded-xl px-5 py-4 outline-none font-bold border-2 border-transparent focus:border-orange-200"/>
                                                <div className="flex items-center gap-2 bg-slate-50 rounded-xl px-5 py-4">
                                                    <span className="font-black text-slate-300">$</span>
                                                    <input type="number" disabled={isDeadlinePassed} value={bentoPrice} onChange={e => setBentoPrice(e.target.value)} placeholder="金額" className="w-full bg-transparent outline-none font-black"/>
                                                </div>
                                            </div>
                                            <div className="space-y-4">
                                                <h3 className="font-black text-teal-600 text-sm flex items-center gap-2"><Icon name="Coffee" size={16}/> 飲料</h3>
                                                <input disabled={isDeadlinePassed} value={drinkName} onChange={e => setDrinkName(e.target.value)} placeholder="品項/甜度冰塊" className="w-full bg-slate-50 rounded-xl px-5 py-4 outline-none font-bold border-2 border-transparent focus:border-teal-200"/>
                                                <div className="flex items-center gap-2 bg-slate-50 rounded-xl px-5 py-4">
                                                    <span className="font-black text-slate-300">$</span>
                                                    <input type="number" disabled={isDeadlinePassed} value={drinkPrice} onChange={e => setDrinkPrice(e.target.value)} placeholder="金額" className="w-full bg-transparent outline-none font-black"/>
                                                </div>
                                            </div>
                                        </div>
                                        <button disabled={isDeadlinePassed || isSubmitting} className="w-full bg-slate-900 text-white py-6 rounded-2xl font-black text-xl shadow-xl shadow-slate-200 transition-all active:scale-95 disabled:bg-slate-300">
                                            {isDeadlinePassed ? "截止中" : isSubmitting ? "送出中" : "確認下單 $" + ((Number(bentoPrice)||0)+(Number(drinkPrice)||0))}
                                        </button>
                                    </form>
                                </section>

                                <section className="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm">
                                    <h2 className="text-xl font-black mb-6 text-slate-700 flex items-center gap-2"><Icon name="ListChecks" className="text-green-500" /> 付款與訂單進度</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {orders.length === 0 ? <div className="col-span-full py-10 text-center text-slate-300 italic">目前尚無訂單</div> : 
                                            orders.sort((a,b) => b.timestamp - a.timestamp).map(o => (
                                                <div key={o.id} className={`p-5 rounded-2xl border flex items-center justify-between transition-all ${o.paid ? 'bg-green-50 border-green-100' : 'bg-slate-50 border-slate-100'}`}>
                                                    <div className="min-w-0 pr-2">
                                                        <div className="font-black truncate text-slate-800">{o.name}</div>
                                                        <div className="text-[10px] text-slate-500 truncate">{o.bento} {o.drink && `/ ${o.drink}`}</div>
                                                        <div className="text-xs font-bold text-slate-600 mt-1">${o.total}</div>
                                                    </div>
                                                    <button onClick={async () => {
                                                        const { db, appId, doc, updateDoc } = window.fb;
                                                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', o.id), { paid: !o.paid });
                                                    }} className={`px-4 py-2 rounded-xl text-[10px] font-black shadow-sm transition-all active:scale-90 ${o.paid ? 'bg-green-600 text-white' : 'bg-white text-amber-600 border border-amber-200 hover:bg-amber-50'}`}>
                                                        {o.paid ? '已收' : '付錢'}
                                                    </button>
                                                </div>
                                            ))
                                        }
                                    </div>
                                </section>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <div className="flex gap-2 p-1.5 bg-slate-200 rounded-2xl w-fit">
                                    <button onClick={() => setAdminTab('orders')} className={`px-8 py-2.5 rounded-xl text-sm font-black transition-all ${adminTab === 'orders' ? 'bg-white shadow-sm' : 'text-slate-500'}`}>統計彙整</button>
                                    <button onClick={() => setAdminTab('settings')} className={`px-8 py-2.5 rounded-xl text-sm font-black transition-all ${adminTab === 'settings' ? 'bg-white shadow-sm' : 'text-slate-500'}`}>後台設定</button>
                                </div>
                                {adminTab === 'orders' ? (
                                    <div className="space-y-6">
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                                            <div className="bg-white p-6 rounded-3xl border shadow-sm"><div className="text-[10px] text-slate-400 font-bold mb-1">便當總額</div><div className="text-xl font-black text-orange-600">${stats.bt}</div></div>
                                            <div className="bg-white p-6 rounded-3xl border shadow-sm"><div className="text-[10px] text-slate-400 font-bold mb-1">飲料總額</div><div className="text-xl font-black text-teal-600">${stats.dt}</div></div>
                                            <div className="bg-white p-6 rounded-3xl border shadow-sm"><div className="text-[10px] text-slate-400 font-bold mb-1">應收總計</div><div className="text-xl font-black text-slate-900">${stats.ot}</div></div>
                                            <div className="bg-indigo-600 p-6 rounded-3xl text-white shadow-lg"><div className="text-[10px] text-indigo-200 font-bold mb-1">已實收</div><div className="text-xl font-black">${stats.ps}</div></div>
                                        </div>
                                        <div className="flex justify-end"><button onClick={resetDay} className="text-red-500 text-xs font-bold flex items-center gap-1 hover:underline"><Icon name="RefreshCw" size={14}/> 重置今日資料</button></div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="bg-white p-6 rounded-3xl border shadow-sm">
                                                <h4 className="font-black mb-4 text-orange-600 flex items-center gap-2"><Icon name="Utensils" size={18}/> 便當清單統計</h4>
                                                {Object.entries(stats.bc).map(([n,c]) => <div key={n} className="flex justify-between py-2 border-b border-slate-50 text-sm font-bold"><span>{n}</span><span className="bg-orange-100 text-orange-700 px-3 py-0.5 rounded-full">{c} 份</span></div>)}
                                            </div>
                                            <div className="bg-white p-6 rounded-3xl border shadow-sm">
                                                <h4 className="font-black mb-4 text-teal-600 flex items-center gap-2"><Icon name="Coffee" size={18}/> 飲料清單統計</h4>
                                                {Object.entries(stats.dc).map(([n,c]) => <div key={n} className="flex justify-between py-2 border-b border-slate-50 text-sm font-bold"><span>{n}</span><span className="bg-teal-100 text-teal-700 px-3 py-0.5 rounded-full">{c} 杯</span></div>)}
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-3xl border overflow-hidden">
                                            <table className="w-full text-left text-sm">
                                                <thead className="bg-slate-50 border-b font-black text-[10px] text-slate-400 uppercase tracking-widest">
                                                    <tr><th className="px-6 py-4">姓名</th><th className="px-6 py-4">便當</th><th className="px-6 py-4">飲料</th><th className="px-6 py-4 text-right">刪除</th></tr>
                                                </thead>
                                                <tbody>
                                                    {orders.map(o => (
                                                        <tr key={o.id} className="border-b border-slate-50">
                                                            <td className="px-6 py-4 font-bold">{o.name}</td>
                                                            <td className="px-6 py-4 text-slate-500">{o.bento || '-'}</td>
                                                            <td className="px-6 py-4 text-slate-500">{o.drink || '-'}</td>
                                                            <td className="px-6 py-4 text-right"><button onClick={() => deleteOrder(o.id)} className="text-slate-300 hover:text-red-500"><Icon name="Trash2" size={16}/></button></td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        <div className="bg-white p-8 rounded-[2rem] border shadow-sm">
                                            <h3 className="font-black text-lg mb-6 flex items-center gap-2"><Icon name="Timer" /> 截止時間設定</h3>
                                            <div className="flex gap-2">
                                                <input type="time" value={deadlineInput} onChange={e => setDeadlineInput(e.target.value)} className="bg-slate-50 border-none rounded-2xl px-6 py-4 font-black text-xl outline-none flex-1 focus:ring-4 focus:ring-orange-100 transition-all"/>
                                                <button onClick={async () => {
                                                    if (!deadlineInput || !window.fb) return;
                                                    const [h,m] = deadlineInput.split(':');
                                                    const d = new Date(); d.setHours(parseInt(h), parseInt(m), 0, 0);
                                                    const { db, appId, doc, setDoc } = window.fb;
                                                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), { deadline: d.getTime() });
                                                    showMsg("截止時間已設定");
                                                }} className="bg-orange-500 text-white px-8 py-4 rounded-2xl font-black hover:bg-orange-600 transition-all active:scale-95">設定</button>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="bg-white p-8 rounded-[2rem] text-center border shadow-sm">
                                                <h3 className="font-black text-orange-600 mb-4 flex items-center justify-center gap-2"><Icon name="Camera" /> 便當菜單照片</h3>
                                                <input type="file" className="hidden" ref={bentoInputRef} onChange={e => handleImageUpload(e, 'bento')} />
                                                <button disabled={uploadingType === 'bento'} onClick={() => bentoInputRef.current.click()} className="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black transition-all hover:bg-slate-800 active:scale-95">
                                                    {uploadingType === 'bento' ? "上傳中..." : "拍照或選擇圖片"}
                                                </button>
                                            </div>
                                            <div className="bg-white p-8 rounded-[2rem] text-center border shadow-sm">
                                                <h3 className="font-black text-teal-600 mb-4 flex items-center justify-center gap-2"><Icon name="Camera" /> 飲料菜單照片</h3>
                                                <input type="file" className="hidden" ref={drinkInputRef} onChange={e => handleImageUpload(e, 'drink')} />
                                                <button disabled={uploadingType === 'drink'} onClick={() => drinkInputRef.current.click()} className="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black transition-all hover:bg-slate-800 active:scale-95">
                                                    {uploadingType === 'drink' ? "上傳中..." : "拍照或選擇圖片"}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
