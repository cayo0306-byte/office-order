<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辦公室訂餐系統小幫手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Microsoft JhengHei', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .drag-active { border-color: #2563eb !important; background-color: #eff6ff !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Firebase 金鑰設定（若無設定，系統亦可正常儲存菜單至本機） ---
        const firebaseConfig = {
            apiKey: "AIzaSyBV3Xc4s32gMeDRA1euwDBJ3qz2t0rLiAY",
            authDomain: "order-c3529.firebaseapp.com",
            projectId: "order-c3529",
            storageBucket: "order-c3529.firebasestorage.app",
            messagingSenderId: "700659521697",
            appId: "1:700659521697:web:e94b9f712409e4c57c38e0"
        };

        const appId = "ntuyun-psych-order-v1";
        
        const ICE_OPTIONS = ["正常冰", "少冰", "微冰", "去冰"];
        const SUGAR_OPTIONS = ["正常糖", "半糖", "微糖", "1分糖", "無糖"];

        function App() {
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [settings, setSettings] = useState({ beverageMenu: null, mealMenu: null, deadline: null });
            const [activeTab, setActiveTab] = useState('beverage');
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState(null);
            const [isAdding, setIsAdding] = useState(false);
            const [now, setNow] = useState(Date.now());
            const [copyStatus, setCopyStatus] = useState(null);
            const [customMin, setCustomMin] = useState(30);
            const [isProcessingImage, setIsProcessingImage] = useState(false);
            
            // 新增：偵測是否啟動本機離線降級模式
            const [usingLocalStorage, setUsingLocalStorage] = useState(false);

            // 修改訂單狀態
            const [editingOrder, setEditingOrder] = useState(null);

            // 菜單燈箱放大縮小與拖曳狀態
            const [lightboxImg, setLightboxImg] = useState(null);
            const [zoomScale, setZoomScale] = useState(1);
            const [panOffset, setPanOffset] = useState({ x: 0, y: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

            // 新增訂單初始狀態
            const [newOrder, setNewOrder] = useState({
                name: '', item: '', sugar: '半糖', ice: '微冰', note: '', price: '', type: 'beverage', quantity: 1
            });

            // 本機暫存模式：當 Firebase 失敗時，自動儲存至 LocalStorage 防止資料遺失
            useEffect(() => {
                if (usingLocalStorage) {
                    localStorage.setItem('fallback_orders', JSON.stringify(orders));
                }
            }, [orders, usingLocalStorage]);

            // 新增：設定與中止截止時間的處理函式
            const handleSetDeadline = () => {
                const timeVal = Date.now() + Number(customMin) * 60000;
                setSettings(prev => ({ ...prev, deadline: timeVal }));
                if (!usingLocalStorage && firebaseConfig.apiKey && firebaseConfig.apiKey !== "您的_API_KEY") {
                    firebase.firestore().collection('settings').doc(appId).set({ deadline: timeVal }, { merge: true });
                } else {
                    localStorage.setItem('fallback_deadline', timeVal);
                }
            };

            const handleCancelDeadline = () => {
                setSettings(prev => ({ ...prev, deadline: null }));
                if (!usingLocalStorage && firebaseConfig.apiKey && firebaseConfig.apiKey !== "您的_API_KEY") {
                    firebase.firestore().collection('settings').doc(appId).set({ deadline: null }, { merge: true });
                } else {
                    localStorage.removeItem('fallback_deadline');
                }
            };

            const formatTimeLeft = () => {
                if (!settings.deadline) return "";
                const diff = settings.deadline - now;
                if (diff <= 0) return "已截止";
                const mins = Math.floor(diff / 60000);
                const secs = Math.floor((diff % 60000) / 1000);
                return `剩餘：${mins}分${secs}秒`;
            };

            useEffect(() => {
                // 本地優先讀取菜單 (解決無法上傳/沒網路時的菜單讀取問題)
                const localBevMenu = localStorage.getItem('local_beverage_menu');
                const localMealMenu = localStorage.getItem('local_meal_menu');
                if (localBevMenu || localMealMenu) {
                    setSettings(prev => ({
                        ...prev,
                        beverageMenu: localBevMenu || prev.beverageMenu,
                        mealMenu: localMealMenu || prev.mealMenu
                    }));
                }

                if (!firebaseConfig.apiKey || firebaseConfig.apiKey === "您的_API_KEY") {
                    // 若無金鑰，切換到本機模式
                    switchToLocalMode("尚未配置 Firebase 金鑰");
                    return;
                }

                try {
                    if (!firebase.apps.length) {
                        firebase.initializeApp(firebaseConfig);
                    }
                    const db = firebase.firestore();
                    const auth = firebase.auth();

                    // 1. 匿名登入
                    auth.signInAnonymously()
                        .then((u) => {
                            setUser(u.user);
                            
                            // 2. 監聽線上訂單 (若權限不夠，會進入 onerror 回呼，此處進行優雅降級)
                            db.collection('orders').where('appId', '==', appId)
                                .onSnapshot(snapshot => {
                                    setOrders(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                                    setLoading(false);
                                }, err => {
                                    console.warn("Firestore error:", err);
                                    switchToLocalMode("Firebase 讀取失敗 (可能為 Rules 權限不足)。已自動切換至「本機暫存模式」，您可以照常使用！");
                                });

                            // 3. 監聽線上設定
                            db.collection('settings').doc(appId)
                                .onSnapshot(doc => {
                                    if (doc.exists) {
                                        const onlineData = doc.data();
                                        setSettings(prev => ({
                                            ...prev,
                                            ...onlineData,
                                            beverageMenu: onlineData.beverageMenu || prev.beverageMenu,
                                            mealMenu: onlineData.mealMenu || prev.mealMenu
                                        }));
                                    }
                                }, err => {
                                    console.warn("Settings fetch failed, fallback to local.");
                                    const fallbackDeadline = localStorage.getItem('fallback_deadline');
                                    if (fallbackDeadline) {
                                        setSettings(prev => ({ ...prev, deadline: Number(fallbackDeadline) }));
                                    }
                                });
                        })
                        .catch(err => {
                            console.warn("Auth failed:", err);
                            switchToLocalMode("Firebase 登入失敗。已自動啟用本機離線點餐模式。");
                        });

                } catch (e) {
                    switchToLocalMode("Firebase 初始化發生錯誤，改用本機模式。");
                }
            }, []);

            // 優雅降級至本機 LocalStorage 模式的函式
            const switchToLocalMode = (reason) => {
                setUsingLocalStorage(true);
                setErrorMsg(reason);
                const savedOrders = localStorage.getItem('fallback_orders');
                if (savedOrders) {
                    try {
                        setOrders(JSON.parse(savedOrders));
                    } catch(e) {}
                }
                const savedDeadline = localStorage.getItem('fallback_deadline');
                if (savedDeadline) {
                    setSettings(prev => ({ ...prev, deadline: Number(savedDeadline) }));
                }
                setLoading(false);
            };

            useEffect(() => {
                const timer = setInterval(() => setNow(Date.now()), 1000);
                return () => clearInterval(timer);
            }, []);

            // 全域鍵盤貼上事件監聽 (可讓使用者直接在網頁上貼上螢幕截圖 Ctrl+V)
            useEffect(() => {
                const handleGlobalPaste = async (e) => {
                    const items = e.clipboardData?.items;
                    if (!items) return;
                    for (let i = 0; i < items.length; i++) {
                        if (items[i].type.indexOf('image') !== -1) {
                            const file = items[i].getAsFile();
                            // 自動辨識目前在哪個 Tab，就把截圖更新至該 Tab 菜單
                            handleImageProcess(file, activeTab);
                            break;
                        }
                    }
                };
                window.addEventListener('paste', handleGlobalPaste);
                return () => window.removeEventListener('paste', handleGlobalPaste);
            }, [activeTab]);

            const isExpired = settings.deadline ? now > settings.deadline : false;

            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            const MAX_WIDTH = 800; // 降低解析度以確保上傳順暢
                            if (width > MAX_WIDTH) {
                                height = (MAX_WIDTH / width) * height;
                                width = MAX_WIDTH;
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            // 壓縮成 0.5 畫質
                            resolve(canvas.toDataURL('image/jpeg', 0.5));
                        };
                    };
                });
            };

            const handleImageProcess = async (file, type) => {
                if (!file) return;
                setIsProcessingImage(true);
                try {
                    const compressedBase64 = await compressImage(file);
                    
                    // 1. 同步保存至本地 (確保離線或無 Firebase 也能看到)
                    localStorage.setItem(`local_${type}_menu`, compressedBase64);
                    setSettings(prev => ({
                        ...prev,
                        [type === 'beverage' ? 'beverageMenu' : 'mealMenu']: compressedBase64
                    }));

                    // 2. 如果已連接 Firebase 且無報錯，則存入雲端
                    if (!usingLocalStorage && firebaseConfig.apiKey && firebaseConfig.apiKey !== "您的_API_KEY") {
                        await firebase.firestore().collection('settings').doc(appId).set({
                            [type === 'beverage' ? 'beverageMenu' : 'mealMenu']: compressedBase64
                        }, { merge: true });
                    }
                } catch (err) {
                    console.error("圖片處理失敗", err);
                } finally {
                    setIsProcessingImage(false);
                }
            };

            const handleAddOrder = async (e) => {
                e.preventDefault();
                if (isExpired || !newOrder.name || !newOrder.item || !newOrder.price) return;
                
                const orderData = {
                    ...newOrder,
                    appId,
                    type: activeTab,
                    price: Number(newOrder.price),
                    quantity: Number(newOrder.quantity) || 1,
                    createdAt: Date.now(),
                    isPaid: false
                };

                // 線上模式
                if (!usingLocalStorage && firebaseConfig.apiKey && firebaseConfig.apiKey !== "您的_API_KEY") {
                    try {
                        await firebase.firestore().collection('orders').add(orderData);
                    } catch (err) { 
                        console.error("Firebase write error, fallback to local save", err); 
                        setOrders(prev => [...prev, { id: 'local_' + Date.now(), ...orderData }]);
                    }
                } else {
                    // 展示/本機模式，存至 LocalState
                    setOrders(prev => [...prev, { id: 'local_' + Date.now(), ...orderData }]);
                }

                setNewOrder({ ...newOrder, item: '', price: '', note: '', sugar: '半糖', ice: '微冰', quantity: 1 });
                setIsAdding(false);
            };

            const handleUpdateOrder = async (e) => {
                e.preventDefault();
                if (!editingOrder) return;
                
                const updateData = {
                    name: editingOrder.name,
                    item: editingOrder.item,
                    sugar: editingOrder.sugar || '半糖',
                    ice: editingOrder.ice || '微冰',
                    note: editingOrder.note || '',
                    price: Number(editingOrder.price),
                    quantity: Number(editingOrder.quantity) || 1
                };

                if (!usingLocalStorage && firebaseConfig.apiKey && firebaseConfig.apiKey !== "您的_API_KEY") {
                    try {
                        await firebase.firestore().collection('orders').doc(editingOrder.id).update(updateData);
                    } catch (err) { 
                        console.error("更新訂單失敗", err); 
                        setOrders(prev => prev.map(o => o.id === editingOrder.id ? { ...o, ...updateData } : o));
                    }
                } else {
                    setOrders(prev => prev.map(o => o.id === editingOrder.id ? { ...o, ...updateData } : o));
                }
                setEditingOrder(null);
            };

            const handleDeleteOrder = async (orderId) => {
                if (!usingLocalStorage && firebaseConfig.apiKey && firebaseConfig.apiKey !== "您的_API_KEY") {
                    try {
                        await firebase.firestore().collection('orders').doc(orderId).delete();
                    } catch (err) { 
                        console.error(err); 
                        setOrders(prev => prev.filter(o => o.id !== orderId));
                    }
                } else {
                    setOrders(prev => prev.filter(o => o.id !== orderId));
                }
            };

            const handleTogglePaid = async (orderId, currentPaid) => {
                if (!usingLocalStorage && firebaseConfig.apiKey && firebaseConfig.apiKey !== "您的_API_KEY") {
                    try {
                        await firebase.firestore().collection('orders').doc(orderId).update({ isPaid: !currentPaid });
                    } catch (err) { 
                        console.error(err); 
                        setOrders(prev => prev.map(o => o.id === orderId ? { ...o, isPaid: !o.isPaid } : o));
                    }
                } else {
                    setOrders(prev => prev.map(o => o.id === orderId ? { ...o, isPaid: !o.isPaid } : o));
                }
            };

            const stats = useMemo(() => {
                const filtered = orders.filter(o => o.type === activeTab);
                
                const totalAmount = orders.reduce((sum, o) => sum + ((Number(o.price) || 0) * (Number(o.quantity) || 1)), 0);
                const paidAmount = orders.filter(o => o.isPaid).reduce((sum, o) => sum + ((Number(o.price) || 0) * (Number(o.quantity) || 1)), 0);
                const totalCount = orders.reduce((sum, o) => sum + (Number(o.quantity) || 1), 0);
                
                const groups = filtered.reduce((acc, o) => {
                    const key = o.type === 'beverage' 
                        ? `${o.item} (${o.sugar}/${o.ice})` 
                        : `${o.item} ${o.note ? `[${o.note}]` : ''}`;
                    const qty = Number(o.quantity) || 1;
                    acc[key] = (acc[key] || 0) + qty;
                    return acc;
                }, {});

                return {
                    totalAmount, 
                    paidAmount,
                    count: filtered.reduce((sum, o) => sum + (Number(o.quantity) || 1), 0),
                    totalCount,
                    groups: Object.entries(groups).sort((a,b) => b[1]-a[1])
                };
            }, [orders, activeTab]);

            const handleExportCSV = () => {
                // 定義 CSV 欄位標題
                const headers = ["訂購類別", "訂購者名字", "訂購項目", "細項(糖度/冰量/備註)", "單價", "數量", "總金額", "是否付款"];
                
                // 轉換訂單資料
                const rows = orders.map(o => {
                    const details = o.type === 'beverage' ? `${o.sugar}/${o.ice}` : (o.note || '無');
                    const subtotal = (Number(o.price) || 0) * (Number(o.quantity) || 1);
                    return [
                        o.type === 'beverage' ? '飲料' : '餐點',
                        o.name || '',
                        o.item || '',
                        details,
                        o.price || 0,
                        o.quantity || 1,
                        subtotal,
                        o.isPaid ? '已付款' : '未付款'
                    ];
                });

                // 產生 CSV 字串 (並加入 UTF-8 BOM '\uFEFF' 防止 Excel 亂碼)
                let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
                csvContent += [headers.join(","), ...rows.map(e => e.map(val => `"${String(val).replace(/"/g, '""')}"`).join(","))].join("\n");

                // 下載 CSV 檔案
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `辦公室訂餐統計_${new Date().toISOString().slice(0, 10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const copyResult = (type) => {
                let text = `🏢 辦公室訂餐系統小幫手 🏢\n📦 ${type === 'beverage' ? '飲料' : '餐點'} 結單統計 📦\n`;
                stats.groups.forEach(([l, c]) => text += `● ${l} x ${c}\n`);
                text += `------------------------\n總計金額：$${stats.totalAmount}`;
                
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopyStatus(`已複製結單訊息！`);
                setTimeout(() => setCopyStatus(null), 2000);
            };

            const openLightbox = (imgSrc) => {
                setLightboxImg(imgSrc);
                setZoomScale(1);
                setPanOffset({ x: 0, y: 0 });
            };

            const closeLightbox = () => {
                setLightboxImg(null);
            };

            const handleZoom = (amount) => {
                setZoomScale(prev => Math.max(0.5, Math.min(4, prev + amount)));
            };

            const handleMouseDown = (e) => {
                setIsDragging(true);
                setDragStart({ x: e.clientX - panOffset.x, y: e.clientY - panOffset.y });
            };

            const handleMouseMove = (e) => {
                if (!isDragging) return;
                setPanOffset({
                    x: e.clientX - dragStart.x,
                    y: e.clientY - dragStart.y
                });
            };

            const handleMouseUpOrLeave = () => {
                setIsDragging(false);
            };

            // 支援手機觸控手勢
            const handleTouchStart = (e) => {
                if (e.touches.length === 1) {
                    setIsDragging(true);
                    setDragStart({ 
                        x: e.touches[0].clientX - panOffset.x, 
                        y: e.touches[0].clientY - panOffset.y 
                    });
                }
            };

            const handleTouchMove = (e) => {
                if (!isDragging || e.touches.length !== 1) return;
                setPanOffset({
                    x: e.touches[0].clientX - dragStart.x,
                    y: e.touches[0].clientY - dragStart.y
                });
            };

            if (loading) return <div className="h-screen flex items-center justify-center text-slate-400 animate-pulse font-bold">系統連線中...</div>;
            
            return (
                <div className="min-h-screen pb-20">
                    <nav className="bg-white border-b sticky top-0 z-30 shadow-sm px-6 h-16 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 text-white p-2 rounded-xl font-black text-xs shadow-lg shadow-blue-200">辦公室</div>
                            <h1 className="text-sm md:text-lg font-black text-slate-800 tracking-tight">辦公室訂餐系統小幫手</h1>
                        </div>
                        <div className="flex items-center gap-2">
                            <button 
                                onClick={handleExportCSV} 
                                className="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 md:px-4 md:py-2 rounded-xl text-xs font-black shadow-md flex items-center gap-1 transition-all"
                                title="下載 Microsoft Excel 可直接開啟的 CSV 報表"
                            >
                                📊 匯出完整 CSV
                            </button>
                            {settings.deadline && (
                                <div className={`hidden sm:block px-3 py-1.5 rounded-full text-xs font-black ${isExpired ? 'bg-red-100 text-red-600' : 'bg-orange-100 text-orange-600 animate-pulse'}`}>
                                    {formatTimeLeft()}
                                </div>
                            )}
                        </div>
                    </nav>

                    <main className="max-w-5xl mx-auto p-4 space-y-6">
                        {/* 當開啟本機演示模式時，顯示警示條引導發起人修改 */}
                        {errorMsg && (
                            <div className="bg-amber-50 border border-amber-300 rounded-2xl p-4 text-xs text-amber-800 font-medium shadow-sm flex flex-col md:flex-row items-start md:items-center justify-between gap-3 animate-fade-in">
                                <div>
                                    <p className="font-bold text-sm text-amber-900">⚠️ 雲端即時同步未啟用 (使用本機暫存模式中)</p>
                                    <p className="mt-1">原因：{errorMsg}</p>
                                    <p className="mt-1 text-slate-500">此模式下，您的所有設定、訂單與菜單皆會安全儲存於本機瀏覽器。若要與同事同步，請參考下方按鈕的修復步驟。</p>
                                </div>
                                <a 
                                    href="https://console.firebase.google.com/" 
                                    target="_blank" 
                                    rel="noreferrer" 
                                    className="bg-amber-600 hover:bg-amber-700 text-white font-bold py-2 px-4 rounded-xl text-xs tracking-wide transition-all shrink-0 shadow-sm"
                                >
                                    去 Firebase 修改 Rules
                                </a>
                            </div>
                        )}

                        {/* 控制工具列 */}
                        <section className="bg-white p-4 rounded-3xl shadow-sm border border-slate-200 flex flex-wrap gap-4 items-center">
                            {}
                            <div className="flex flex-wrap items-center gap-2">
                                <div className="flex items-center bg-slate-100 p-1.5 rounded-2xl border">
                                    <span className="text-xs px-2 text-slate-500 font-bold">設定時間 (分鐘):</span>
                                    <input type="number" value={customMin} onChange={e => setCustomMin(e.target.value)} className="w-12 bg-transparent text-center font-black text-blue-600 focus:outline-none" />
                                    <button onClick={handleSetDeadline} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-xl text-xs font-bold shadow-md active:scale-95 transition-all">
                                        {settings.deadline ? "重新設定" : "開始倒數"}
                                    </button>
                                </div>
                                {settings.deadline && (
                                    <button onClick={handleCancelDeadline} className="bg-rose-500 hover:bg-rose-600 text-white px-4 py-2.5 rounded-2xl text-xs font-black shadow-md active:scale-95 transition-all">
                                        ⏹️ 中止倒數 (取消截止)
                                    </button>
                                )}
                            </div>
                            <div className="flex gap-2 ml-auto">
                                <button onClick={() => copyResult(activeTab)} className="bg-indigo-600 text-white px-5 py-2 rounded-2xl text-xs font-bold border border-indigo-100 shadow-md active:scale-95 transition-all">複製結單</button>
                            </div>
                        </section>

                        {/* 統計儀表板 */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <StatCard label="總份數" value={`${stats.totalCount} 份`} color="blue" />
                            <StatCard label="總金額" value={`$${stats.totalAmount}`} color="green" />
                            <StatCard label="未收金額" value={`$${stats.totalAmount - stats.paidAmount}`} color="red" />
                            <StatCard label="付款進度" value={`${orders.filter(o=>o.isPaid).reduce((sum, o)=>sum+(o.quantity||1), 0)}/${stats.totalCount}`} color="emerald" />
                        </div>

                        <div className="flex flex-col md:flex-row gap-6">
                            {/* 左側菜單區 (含拖曳與點擊上傳) */}
                            <div className="md:w-1/3 space-y-4">
                                <MenuBox 
                                    title="🥤 飲料菜單" 
                                    img={settings.beverageMenu} 
                                    onUpload={(file) => handleImageProcess(file, 'beverage')} 
                                    processing={isProcessingImage} 
                                    onImageClick={openLightbox}
                                />
                                <MenuBox 
                                    title="🍱 餐點菜單" 
                                    img={settings.mealMenu} 
                                    onUpload={(file) => handleImageProcess(file, 'meal')} 
                                    processing={isProcessingImage} 
                                    onImageClick={openLightbox}
                                />
                                <div className="bg-blue-50 border border-blue-200 rounded-2xl p-3 text-xs text-blue-700 font-bold space-y-1">
                                    <p>💡 實用小秘訣：</p>
                                    <ul className="list-disc pl-4 space-y-1">
                                        <li>在網頁直接按 <b>Ctrl + V</b> 可以直接上傳貼上您的截圖！</li>
                                        <li>點擊菜單縮圖可開啟<b>高畫質無損放大鏡模式</b>，方便比對小字。</li>
                                    </ul>
                                </div>
                            </div>

                            {/* 右側訂單區 */}
                            <div className="flex-1 space-y-4">
                                <div className="flex bg-slate-200 p-1.5 rounded-2xl w-fit">
                                    <button onClick={() => setActiveTab('beverage')} className={`px-8 py-2.5 rounded-xl text-sm font-black transition-all ${activeTab === 'beverage' ? 'bg-white text-blue-600 shadow-md' : 'text-slate-500'}`}>飲料部</button>
                                    <button onClick={() => setActiveTab('meal')} className={`px-8 py-2.5 rounded-xl text-sm font-black transition-all ${activeTab === 'meal' ? 'bg-white text-orange-600 shadow-md' : 'text-slate-500'}`}>餐點部</button>
                                </div>

                                <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="p-5 border-b flex justify-between items-center bg-slate-50/50">
                                        <h3 className="font-black text-slate-700">{activeTab === 'beverage' ? '飲料清單' : '餐點清單'}</h3>
                                        {!isExpired && (
                                            <button onClick={() => setIsAdding(!isAdding)} className={`px-6 py-2 rounded-2xl text-sm font-black text-white shadow-lg transition-all active:scale-95 ${isAdding ? 'bg-slate-400' : 'bg-blue-600'}`}>{isAdding ? '取消' : '我要點餐'}</button>
                                        )}
                                    </div>

                                    {/* 新增訂單表單 */}
                                    {isAdding && (
                                        <form onSubmit={handleAddOrder} className="p-6 bg-blue-50 border-b grid grid-cols-2 md:grid-cols-4 gap-3">
                                            <input type="text" placeholder="姓名" className="p-3 rounded-xl border text-sm" value={newOrder.name} onChange={e => setNewOrder({...newOrder, name: e.target.value})} required />
                                            <input type="text" placeholder={activeTab === 'beverage' ? "品項" : "餐點內容"} className="p-3 rounded-xl border text-sm" value={newOrder.item} onChange={e => setNewOrder({...newOrder, item: e.target.value})} required />
                                            {activeTab === 'beverage' ? (
                                                <React.Fragment>
                                                    <select className="p-3 rounded-xl border text-sm bg-white" value={newOrder.sugar} onChange={e => setNewOrder({...newOrder, sugar: e.target.value})}>
                                                        {SUGAR_OPTIONS.map(s => <option key={s} value={s}>{s}</option>)}
                                                    </select>
                                                    <select className="p-3 rounded-xl border text-sm bg-white" value={newOrder.ice} onChange={e => setNewOrder({...newOrder, ice: e.target.value})}>
                                                        {ICE_OPTIONS.map(i => <option key={i} value={i}>{i}</option>)}
                                                    </select>
                                                </React.Fragment>
                                            ) : (
                                                <input type="text" placeholder="備註(選填)" className="p-3 rounded-xl border text-sm md:col-span-2" value={newOrder.note} onChange={e => setNewOrder({...newOrder, note: e.target.value})} />
                                            )}
                                            <input type="number" placeholder="金額(單價)" className="p-3 rounded-xl border text-sm" value={newOrder.price} onChange={e => setNewOrder({...newOrder, price: e.target.value})} required />
                                            
                                            {/* 數量輸入控制 */}
                                            <div className="flex items-center bg-white border rounded-xl px-2">
                                                <span className="text-xs text-slate-400 font-bold px-1">數量</span>
                                                <button type="button" onClick={() => setNewOrder(prev => ({...prev, quantity: Math.max(1, prev.quantity - 1)}))} className="p-2 text-slate-500 font-bold">-</button>
                                                <input type="number" min="1" className="w-12 text-center font-bold text-sm border-0 focus:ring-0" value={newOrder.quantity} onChange={e => setNewOrder({...newOrder, quantity: Math.max(1, Number(e.target.value))})} />
                                                <button type="button" onClick={() => setNewOrder(prev => ({...prev, quantity: prev.quantity + 1}))} className="p-2 text-slate-500 font-bold">+</button>
                                            </div>

                                            <button type="submit" className="col-span-2 md:col-span-2 bg-slate-800 text-white rounded-xl font-black shadow-lg hover:bg-slate-900">送出訂單</button>
                                        </form>
                                    )}

                                    {/* 訂單明細表格 */}
                                    <div className="overflow-x-auto custom-scrollbar">
                                        <table className="w-full text-sm">
                                            <thead className="bg-slate-50 text-slate-400 font-black uppercase text-[10px] tracking-widest">
                                                <tr>
                                                    <th className="px-6 py-4 text-left">姓名</th>
                                                    <th className="px-6 py-4 text-left">內容</th>
                                                    <th className="px-6 py-4 text-center">數量</th>
                                                    <th className="px-6 py-4 text-center">單價/小計</th>
                                                    <th className="px-6 py-4 text-center">付款狀態</th>
                                                    <th className="px-6 py-4 text-right">管理</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {orders.filter(o => o.type === activeTab).length === 0 ? (
                                                    <tr>
                                                        <td colSpan="6" className="text-center py-8 text-slate-400 italic">尚無任何訂單項目</td>
                                                    </tr>
                                                ) : (
                                                    orders.filter(o => o.type === activeTab).map(o => (
                                                        <tr key={o.id} className="hover:bg-slate-50/80 transition-colors">
                                                            <td className="px-6 py-4 font-black text-slate-700">{o.name}</td>
                                                            <td className="px-6 py-4">
                                                                <div className="font-bold text-slate-800">{o.item}</div>
                                                                <div className="text-[10px] text-slate-400 mt-1 font-bold bg-slate-100 w-fit px-2 py-0.5 rounded-full">
                                                                    {o.type === 'beverage' ? `${o.sugar} / ${o.ice}` : o.note || '無備註'}
                                                                </div>
                                                            </td>
                                                            <td className="px-6 py-4 text-center font-black text-slate-600">
                                                                x {o.quantity || 1}
                                                            </td>
                                                            <td className="px-6 py-4 text-center">
                                                                <div className="font-bold text-slate-500 text-xs">${o.price}</div>
                                                                <div className="font-black text-slate-900">${(o.price || 0) * (o.quantity || 1)}</div>
                                                            </td>
                                                            <td className="px-6 py-4 text-center">
                                                                <button onClick={() => handleTogglePaid(o.id, o.isPaid)} className={`px-4 py-1 rounded-full text-[10px] font-black shadow-sm transition-all ${o.isPaid ? 'bg-emerald-500 text-white' : 'bg-red-50 text-red-500 border border-red-100'}`}>
                                                                    {o.isPaid ? '已付' : '未付'}
                                                                </button>
                                                            </td>
                                                            <td className="px-6 py-4 text-right">
                                                                <div className="flex justify-end gap-2">
                                                                    <button onClick={() => setEditingOrder({...o})} className="text-slate-400 hover:text-blue-600 transition-all font-bold" title="修改">✏️</button>
                                                                    <button onClick={() => handleDeleteOrder(o.id)} className="text-slate-300 hover:text-red-500 transition-all" title="刪除">🗑️</button>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 彙整統計摘要 */}
                        <section className="bg-white p-6 rounded-3xl border border-slate-200">
                            <h3 className="font-black text-slate-700 mb-5 flex items-center gap-2">📊 彙整統計摘要</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                {stats.groups.length === 0 ? (
                                    <div className="col-span-full text-center text-slate-400 italic py-4">無統計資訊</div>
                                ) : (
                                    stats.groups.map(([l, c]) => (
                                        <div key={l} className="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100 group hover:border-blue-200 transition-all">
                                            <span className="text-sm text-slate-600 font-bold">{l}</span>
                                            <span className="font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-lg">x {c}</span>
                                        </div>
                                    ))
                                )}
                            </div>
                        </section>
                    </main>

                    {lightboxImg && (
                        <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-sm z-50 flex flex-col items-center justify-center p-4">
                            {/* 工具列 */}
                            <div className="absolute top-4 right-4 flex gap-3 z-50 bg-slate-800/80 p-2.5 rounded-2xl border border-slate-700 shadow-xl">
                                <button onClick={() => handleZoom(0.25)} className="text-white bg-slate-700 hover:bg-slate-600 p-2 rounded-xl text-xs font-black transition-all">🔍 放大 (+)</button>
                                <button onClick={() => handleZoom(-0.25)} className="text-white bg-slate-700 hover:bg-slate-600 p-2 rounded-xl text-xs font-black transition-all">🔍 縮小 (-)</button>
                                <button onClick={() => { setZoomScale(1); setPanOffset({ x: 0, y: 0 }); }} className="text-white bg-slate-700 hover:bg-slate-600 p-2 rounded-xl text-xs font-black transition-all">還原 (1:1)</button>
                                <button onClick={closeLightbox} className="text-white bg-red-600 hover:bg-red-500 p-2 rounded-xl text-xs font-black transition-all">✕ 關閉</button>
                            </div>

                            {/* 拖曳與滾動視窗 */}
                            <div 
                                className="w-full h-full flex items-center justify-center overflow-hidden cursor-grab active:cursor-grabbing"
                                onMouseDown={handleMouseDown}
                                onMouseMove={handleMouseMove}
                                onMouseUp={handleMouseUpOrLeave}
                                onMouseLeave={handleMouseUpOrLeave}
                                onTouchStart={handleTouchStart}
                                onTouchMove={handleTouchMove}
                                onTouchEnd={handleMouseUpOrLeave}
                            >
                                <img 
                                    src={lightboxImg} 
                                    alt="放大預覽菜單" 
                                    draggable="false"
                                    className="max-w-full max-h-full object-contain pointer-events-none transition-transform duration-100 ease-out"
                                    style={{
                                        transform: `translate(${panOffset.x}px, ${panOffset.y}px) scale(${zoomScale})`,
                                    }}
                                />
                            </div>
                            
                            <div className="absolute bottom-4 text-center text-slate-400 text-xs font-bold pointer-events-none">
                                💡 提示：您可以使用滑鼠左鍵/觸控螢幕「按住並拖曳」來移動圖片視角
                            </div>
                        </div>
                    )}

                    {/* 修改訂單彈出視窗 */}
                    {editingOrder && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl max-w-md w-full border border-slate-100 p-6 space-y-4 transform transition-all">
                                <div className="flex justify-between items-center border-b pb-3">
                                    <h3 className="text-lg font-black text-slate-800">✏️ 修改訂單資料</h3>
                                    <button onClick={() => setEditingOrder(null)} className="text-slate-400 hover:text-slate-600 font-bold">✕</button>
                                </div>
                                <form onSubmit={handleUpdateOrder} className="space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 block mb-1">姓名</label>
                                        <input type="text" className="w-full p-2.5 border rounded-xl text-sm" value={editingOrder.name} onChange={e => setEditingOrder({...editingOrder, name: e.target.value})} required />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 block mb-1">{editingOrder.type === 'beverage' ? '飲料品項' : '餐點內容'}</label>
                                        <input type="text" className="w-full p-2.5 border rounded-xl text-sm" value={editingOrder.item} onChange={e => setEditingOrder({...editingOrder, item: e.target.value})} required />
                                    </div>
                                    {editingOrder.type === 'beverage' ? (
                                        <div className="grid grid-cols-2 gap-2">
                                            <div>
                                                <label className="text-xs font-bold text-slate-500 block mb-1">甜度</label>
                                                <select className="w-full p-2.5 border rounded-xl text-sm bg-white" value={editingOrder.sugar} onChange={e => setEditingOrder({...editingOrder, sugar: e.target.value})}>
                                                    {SUGAR_OPTIONS.map(s => <option key={s} value={s}>{s}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-slate-500 block mb-1">冰量</label>
                                                <select className="w-full p-2.5 border rounded-xl text-sm bg-white" value={editingOrder.ice} onChange={e => setEditingOrder({...editingOrder, ice: e.target.value})}>
                                                    {ICE_OPTIONS.map(i => <option key={i} value={i}>{i}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                    ) : (
                                        <div>
                                            <label className="text-xs font-bold text-slate-500 block mb-1">備註</label>
                                            <input type="text" className="w-full p-2.5 border rounded-xl text-sm" value={editingOrder.note || ''} onChange={e => setEditingOrder({...editingOrder, note: e.target.value})} />
                                        </div>
                                    )}
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-xs font-bold text-slate-500 block mb-1">單價</label>
                                            <input type="number" className="w-full p-2.5 border rounded-xl text-sm" value={editingOrder.price} onChange={e => setEditingOrder({...editingOrder, price: Number(e.target.value)})} required />
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-500 block mb-1">數量</label>
                                            <div className="flex items-center border rounded-xl px-1">
                                                <button type="button" onClick={() => setEditingOrder(prev => ({...prev, quantity: Math.max(1, prev.quantity - 1)}))} className="p-2 text-slate-500 font-bold">-</button>
                                                <input type="number" min="1" className="w-full text-center font-bold text-sm border-0 focus:ring-0 p-1" value={editingOrder.quantity} onChange={e => setEditingOrder({...editingOrder, quantity: Math.max(1, Number(e.target.value))})} />
                                                <button type="button" onClick={() => setEditingOrder(prev => ({...prev, quantity: prev.quantity + 1}))} className="p-2 text-slate-500 font-bold">+</button>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex gap-2 justify-end pt-3">
                                        <button type="button" onClick={() => setEditingOrder(null)} className="px-4 py-2 bg-slate-100 text-slate-600 rounded-xl text-sm font-bold">取消</button>
                                        <button type="submit" className="px-5 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700">儲存修改</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {copyStatus && <div className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-8 py-3 rounded-full text-sm font-black shadow-2xl animate-bounce z-50">{copyStatus}</div>}
                </div>
            );
        }

        function StatCard({ label, value, color }) {
            const colors = { 
                blue: 'text-blue-600 bg-blue-50 border-blue-100', 
                green: 'text-emerald-600 bg-emerald-50 border-emerald-100', 
                red: 'text-red-600 bg-red-50 border-red-100', 
                emerald: 'text-indigo-600 bg-indigo-50 border-indigo-100' 
            };
            return (
                <div className={`bg-white p-5 rounded-3xl border-2 shadow-sm transition-all hover:shadow-md ${colors[color]}`}>
                    <div className="text-[10px] font-black uppercase tracking-widest mb-2 opacity-60">{label}</div>
                    <div className="text-2xl font-black tracking-tight">{value}</div>
                </div>
            );
        }

        function MenuBox({ title, img, onUpload, processing, onImageClick }) {
            const [isDragOver, setIsDragOver] = useState(false);
            const fileInputRef = useRef(null);

            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragOver(true);
            };

            const handleDragLeave = () => {
                setIsDragOver(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragOver(false);
                const files = e.dataTransfer.files;
                if (files && files[0]) {
                    onUpload(files[0]);
                }
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    onUpload(file);
                }
            };

            return (
                <div 
                    className={`bg-white rounded-3xl shadow-sm border-2 transition-all overflow-hidden ${isDragOver ? 'border-blue-500 bg-blue-50' : 'border-slate-200'}`}
                    onDragOver={handleDragOver}
                    onDragLeave={handleDragLeave}
                    onDrop={handleDrop}
                >
                    <div className="p-4 bg-slate-50 border-b flex justify-between items-center">
                        <span className="text-xs font-black text-slate-600">{title}</span>
                        <button 
                            type="button"
                            onClick={() => fileInputRef.current.click()}
                            className="text-[10px] bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-xl cursor-pointer font-black shadow-md shadow-blue-100 transition-colors"
                        >
                            {processing ? '處理中...' : '更新菜單'}
                        </button>
                        <input 
                            type="file" 
                            ref={fileInputRef}
                            className="hidden" 
                            accept="image/*" 
                            onChange={handleFileChange} 
                            disabled={processing} 
                        />
                    </div>
                    <div className="h-48 bg-slate-50 flex flex-col items-center justify-center p-2 relative group">
                        {img ? (
                            <div className="w-full h-full relative cursor-zoom-in" onClick={() => onImageClick(img)}>
                                <img src={img} className="w-full h-full object-cover rounded-xl border border-slate-100" />
                                <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center rounded-xl">
                                    <span className="text-white text-xs font-bold bg-slate-900/80 px-3 py-1.5 rounded-full">🔍 點擊展開放大鏡</span>
                                </div>
                            </div>
                        ) : (
                            <div 
                                className="text-xs text-slate-400 font-bold italic text-center cursor-pointer p-4 border border-dashed border-slate-300 w-full h-full flex flex-col items-center justify-center rounded-xl"
                                onClick={() => fileInputRef.current.click()}
                            >
                                <span className="text-xl mb-1">📸</span>
                                點此上傳、拖曳圖片
                                <br />或直接在此處貼上(Ctrl+V)
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
