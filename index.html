
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辦公室訂餐小幫手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @media print {
            header, button, .no-print, input, .fixed { display: none !important; }
            body { background: white !important; color: black !important; }
            .print-only { display: block !important; }
            .printable-area { display: block !important; width: 100% !important; }
            .card-grid { display: grid !important; grid-template-cols: repeat(4, 1fr) !important; gap: 10px !important; }
            .card-grid > div { border: 1px solid #000 !important; padding: 10px !important; }
            table { width: 100% !important; border-collapse: collapse !important; }
            th, td { border: 1px solid #000 !important; padding: 8px !important; }
        }
        .print-only { display: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root">
        <div class="h-screen flex items-center justify-center flex-col gap-4 text-slate-400">
            <div class="w-10 h-10 border-4 border-slate-200 border-t-orange-500 rounded-full loading-spinner"></div>
            <p class="font-bold animate-pulse">正在初始化雲端連線...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // --- 🟢 請在這裡貼上您的 Firebase Config 🟢 ---
        const firebaseConfig = {
           apiKey: "AIzaSyBV3Xc4s32gMeDRA1euwDBJ3qz2t0rLiAY",
  authDomain: "order-c3529.firebaseapp.com",
  projectId: "order-c3529",
  storageBucket: "order-c3529.firebasestorage.app",
  messagingSenderId: "700659521697",
  appId: "1:700659521697:web:e94b9f712409e4c57c38e0"
        };

        try {
            if (firebaseConfig.apiKey.includes("在此貼上")) {
                window.fbError = "【設定遺失】請編輯 index.html 並填入您的 Firebase Config 代碼。";
            } else {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);
                window.fb = { auth, db, collection, doc, setDoc, onSnapshot, addDoc, updateDoc, deleteDoc, writeBatch, signInAnonymously, onAuthStateChanged, appId: "lunch-helper-v3" };
            }
        } catch (e) {
            window.fbError = "連線初始化失敗: " + e.message;
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                ShoppingCart: <path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7M2 7v11a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7M2 7h20M16 11a4 4 0 0 1-8 0" />,
                CheckCircle: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></>,
                Plus: <><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></>,
                AlertCircle: <><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></>,
                Share2: <><circle cx="18" cy="5" r="3" /><circle cx="6" cy="12" r="3" /><circle cx="18" cy="19" r="3" /><line x1="8.59" y1="13.51" x2="15.42" y2="17.49" /><line x1="15.41" y1="6.51" x2="8.59" y2="10.49" /></>,
                Printer: <><polyline points="6 9 6 2 18 2 18 9" /><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" /><rect width="12" height="8" x="6" y="14" /></>,
                Camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>,
                Loader2: <path d="M21 12a9 9 0 1 1-6.219-8.56" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isUploading, setIsUploading] = useState(false);
            const [initError, setInitError] = useState(window.fbError || null);
            const [view, setView] = useState('order');
            const [orders, setOrders] = useState([]);
            const [bentoImg, setBentoImg] = useState(null);
            const [drinkImg, setDrinkImg] = useState(null);
            const [message, setMessage] = useState(null);

            const bentoInput = useRef(null);
            const drinkInput = useRef(null);

            const compressImg = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let w = img.width, h = img.height;
                            if (w > 1000) { h = (1000/w)*h; w = 1000; }
                            canvas.width = w; canvas.height = h;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, w, h);
                            resolve(canvas.toDataURL('image/jpeg', 0.5));
                        };
                        img.onerror = reject;
                    };
                    reader.onerror = reject;
                });
            };

            const handleUpload = async (e, type) => {
                const file = e.target.files[0];
                if (!file || !window.fb) return;
                setIsUploading(true);
                try {
                    const base64 = await compressImg(file);
                    const { db, doc, setDoc } = window.fb;
                    await setDoc(doc(db, 'config', type), { image: base64, time: Date.now() });
                    showMsg("菜單更新成功");
                } catch (err) {
                    console.error(err);
                    showMsg("連線或上傳失敗: " + err.message, 'error');
                } finally {
                    setIsUploading(false);
                }
            };

            const showMsg = (text, type = 'success') => {
                setMessage({ text, type });
                setTimeout(() => setMessage(null), 3000);
            };

            useEffect(() => {
                const timer = setTimeout(() => { if(loading) setInitError("雲端載入緩慢，請檢查 Config 是否正確。"); }, 10000);
                const checkFB = setInterval(() => {
                    if (window.fb) {
                        clearInterval(checkFB);
                        const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                        signInAnonymously(auth).catch(err => setInitError("登入失敗: " + err.message));
                        onAuthStateChanged(auth, u => { if(u) setUser(u); });
                    }
                }, 500);
                return () => { clearInterval(checkFB); clearTimeout(timer); };
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, collection, doc, onSnapshot } = window.fb;
                
                const unsubOrders = onSnapshot(collection(db, 'orders'), s => {
                    setOrders(s.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoading(false);
                }, err => setInitError("讀取拒絕: " + err.message));

                const unsubBento = onSnapshot(doc(db, 'config', 'bento'), s => { if(s.exists()) setBentoImg(s.data().image); });
                const unsubDrink = onSnapshot(doc(db, 'config', 'drink'), s => { if(s.exists()) setDrinkImg(s.data().image); });

                return () => { unsubOrders(); unsubBento(); unsubDrink(); };
            }, [user]);

            const renderAdmin = () => (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white p-8 rounded-[2rem] border shadow-sm text-center">
                            <h3 className="font-black text-orange-600 mb-4 flex items-center justify-center gap-2"><Icon name="Camera"/> 更新便當菜單</h3>
                            <input type="file" className="hidden" ref={bentoInput} onChange={e => handleUpload(e, 'bento')} accept="image/*" />
                            <button disabled={isUploading} onClick={() => bentoInput.current.click()} className="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black flex items-center gap-2 mx-auto hover:bg-slate-800 transition-all">
                                {isUploading ? <Icon name="Loader2" className="animate-spin"/> : "拍照上傳"}
                            </button>
                        </div>
                        <div className="bg-white p-8 rounded-[2rem] border shadow-sm text-center">
                            <h3 className="font-black text-teal-600 mb-4 flex items-center justify-center gap-2"><Icon name="Camera"/> 更新飲料菜單</h3>
                            <input type="file" className="hidden" ref={drinkInput} onChange={e => handleUpload(e, 'drink')} accept="image/*" />
                            <button disabled={isUploading} onClick={() => drinkInput.current.click()} className="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black flex items-center gap-2 mx-auto hover:bg-slate-800 transition-all">
                                {isUploading ? <Icon name="Loader2" className="animate-spin"/> : "拍照上傳"}
                            </button>
                        </div>
                    </div>
                    {/* ... stats display remains same ... */}
                </div>
            );

            // ... rest of the component (render logic, order form, etc.) ...
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    {message && <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-slate-900 text-white px-6 py-3 rounded-full font-bold shadow-2xl flex items-center gap-2 animate-bounce"><Icon name="CheckCircle" size={18}/>{message.text}</div>}
                    <header className="bg-white border-b h-16 flex items-center justify-between px-4 sticky top-0 z-30 no-print">
                        <div className="flex items-center gap-2"><div className="bg-orange-500 p-2 rounded-xl text-white"><Icon name="ShoppingCart" /></div><span className="font-black text-xl">訂餐助手</span></div>
                        <div className="flex gap-2">
                            <button onClick={handleShare} className="bg-blue-50 text-blue-600 px-4 py-2 rounded-full text-xs font-bold">分享網址</button>
                            <button onClick={() => setView(view==='order'?'admin':'order')} className="bg-slate-100 px-4 py-2 rounded-full text-xs font-bold">{view==='order'?'管理後台':'返回訂餐'}</button>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 mt-4">
                        {view === 'order' ? (
                            <div className="space-y-6">
                                <div className="grid grid-cols-2 gap-4 no-print">
                                    <div className="bg-white p-2 rounded-2xl border text-center">
                                        <div className="text-[10px] text-orange-600 font-black mb-2">🍱 便當菜單</div>
                                        {bentoImg ? <img src={bentoImg} className="w-full rounded-xl"/> : <div className="py-10 text-slate-300 italic text-xs">尚未上傳照片</div>}
                                    </div>
                                    <div className="bg-white p-2 rounded-2xl border text-center">
                                        <div className="text-[10px] text-teal-600 font-black mb-2">🥤 飲料菜單</div>
                                        {drinkImg ? <img src={drinkImg} className="w-full rounded-xl"/> : <div className="py-10 text-slate-300 italic text-xs">尚未上傳照片</div>}
                                    </div>
                                </div>

                                <section className="bg-white p-8 rounded-[2rem] shadow-xl border no-print">
                                    <h2 className="text-xl font-black mb-8 flex items-center gap-2"><Icon name="Plus" className="text-orange-500"/> 我要訂餐</h2>
                                    <form onSubmit={handleOrder} className="space-y-6">
                                        <input required value={customerName} onChange={e=>setCustomerName(e.target.value)} placeholder="您的姓名" className="w-full text-xl font-black bg-slate-50 p-4 rounded-2xl outline-none focus:ring-4 focus:ring-orange-100"/>
                                        <div className="grid grid-cols-2 gap-6">
                                            <div className="space-y-4">
                                                <h3 className="text-orange-600 font-black text-sm">🍱 便當</h3>
                                                <input value={bName} onChange={e=>setBName(e.target.value)} placeholder="品項" className="w-full bg-slate-50 p-4 rounded-xl outline-none font-bold"/>
                                                <input type="number" value={bPrice} onChange={e=>setBPrice(e.target.value)} placeholder="金額" className="w-full bg-slate-50 p-4 rounded-xl outline-none font-black"/>
                                            </div>
                                            <div className="space-y-4">
                                                <h3 className="text-teal-600 font-black text-sm">🥤 飲料</h3>
                                                <input value={dName} onChange={e=>setDName(e.target.value)} placeholder="品項" className="w-full bg-slate-50 p-4 rounded-xl outline-none font-bold"/>
                                                <input type="number" value={dPrice} onChange={e=>setDPrice(e.target.value)} placeholder="金額" className="w-full bg-slate-50 p-4 rounded-xl outline-none font-black"/>
                                            </div>
                                        </div>
                                        <button className="w-full bg-slate-900 text-white py-6 rounded-2xl font-black text-xl shadow-xl active:scale-95 transition-all">確認下單</button>
                                    </form>
                                </section>

                                <section className="bg-white p-8 rounded-[2rem] border shadow-sm no-print">
                                    <h2 className="text-xl font-black mb-6 text-slate-700 flex items-center gap-2">付款進度</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        {orders.map(o => (
                                            <div key={o.id} className={`p-4 rounded-2xl border flex items-center justify-between ${o.paid?'bg-green-50 border-green-100':'bg-slate-50'}`}>
                                                <div className="min-w-0 pr-2">
                                                    <div className="font-black text-sm truncate">{o.name}</div>
                                                    <div className="text-[10px] text-slate-500 font-bold">${o.total}</div>
                                                </div>
                                                <button onClick={()=>window.fb.updateDoc(window.fb.doc(window.fb.db, 'orders', o.id), {paid: !o.paid})} className={`px-4 py-2 rounded-xl text-[10px] font-black ${o.paid?'bg-green-600 text-white':'bg-white text-orange-600 border border-orange-200'}`}>
                                                    {o.paid ? '已收' : '付錢'}
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        ) : (
                            <div className="printable-area">
                                <div className="print-only text-center border-b-4 border-double border-black pb-4 mb-6"><h1 className="text-3xl font-black">今日訂單統計</h1></div>
                                <div className="grid grid-cols-4 gap-4 text-center font-black card-grid mb-6">
                                    <div className="bg-white p-6 rounded-3xl border">🍱 便當<br/>${stats.bt}</div>
                                    <div className="bg-white p-6 rounded-3xl border">🥤 飲料<br/>${stats.dt}</div>
                                    <div className="bg-white p-6 rounded-3xl border">💰 總額<br/>${stats.ot}</div>
                                    <div className="bg-indigo-600 p-6 rounded-3xl text-white">✅ 實收<br/>${stats.ps}</div>
                                </div>
                                <div className="flex justify-between items-center no-print mb-6">
                                    <button onClick={()=>window.print()} className="bg-indigo-600 text-white px-6 py-2 rounded-full font-bold flex items-center gap-2">列印清單</button>
                                    <button onClick={async()=>{
                                        if(!confirm("確定重置？")) return;
                                        const batch = window.fb.writeBatch(window.fb.db);
                                        orders.forEach(o => batch.delete(window.fb.doc(window.fb.db, 'orders', o.id)));
                                        await batch.commit(); showMsg("已重置資料");
                                    }} className="text-red-500 text-xs font-bold hover:underline">重置訂單</button>
                                </div>
                                <div className="grid grid-cols-2 gap-6 card-grid">
                                    <div className="bg-white p-6 rounded-3xl border shadow-sm">
                                        <h4 className="font-black mb-4 text-orange-600">🍱 便當統計</h4>
                                        {Object.entries(stats.bc).map(([n,c]) => <div key={n} className="flex justify-between py-2 border-b text-sm font-bold"><span>{n}</span><span>{c} 份</span></div>)}
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl border shadow-sm">
                                        <h4 className="font-black mb-4 text-teal-600">🥤 飲料統計</h4>
                                        {Object.entries(stats.dc).map(([n,c]) => <div key={n} className="flex justify-between py-2 border-b text-sm font-bold"><span>{n}</span><span>{c} 杯</span></div>)}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
