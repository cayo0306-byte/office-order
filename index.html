<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辦公室訂餐小幫手</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- 列印專用樣式 --- */
        @media print {
            header, button, .no-print, input, .bg-slate-50, .fixed {
                display: none !important;
            }
            body {
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            main {
                max-width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            .print-only {
                display: block !important;
            }
            .printable-area {
                display: block !important;
                width: 100% !important;
            }
            .card-grid {
                display: grid !important;
                grid-template-cols: repeat(4, 1fr) !important;
                gap: 10px !important;
                margin-bottom: 20px !important;
            }
            .card-grid > div {
                border: 1px solid #000 !important;
                padding: 10px !important;
                box-shadow: none !important;
                page-break-inside: avoid;
            }
            table {
                border-collapse: collapse !important;
                width: 100% !important;
            }
            th, td {
                border: 1px solid #000 !important;
                padding: 8px !important;
                color: black !important;
            }
            .text-orange-600, .text-teal-600, .text-indigo-600, .text-slate-500 {
                color: black !important;
            }
        }
        .print-only { display: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root">
        <div class="h-screen flex items-center justify-center flex-col gap-4 text-slate-400">
            <div class="w-10 h-10 border-4 border-slate-200 border-t-orange-500 rounded-full loading-spinner"></div>
            <p class="font-bold animate-pulse">正在連接雲端服務...</p>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // --- 🔵 步驟 1：填寫您的 Firebase 配置 ---
        let firebaseConfig = {
            apiKey: "AIzaSyBV3Xc4s32gMeDRA1euwDBJ3qz2t0rLiAY",
  authDomain: "order-c3529.firebaseapp.com",
  projectId: "order-c3529",
  storageBucket: "order-c3529.firebasestorage.app",
  messagingSenderId: "700659521697",
  appId: "1:700659521697:web:e94b9f712409e4c57c38e0"
        };

        try {
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
            }

            if (firebaseConfig.apiKey === "你的API_KEY") {
                window.fbError = "未偵測到 Firebase 配置。請編輯 index.html 檔案，將 firebaseConfig 替換為您的 Firebase 專案資訊。";
            } else {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);
                const appId = typeof __app_id !== 'undefined' ? __app_id : "office-lunch-v2"; 

                window.fb = { auth, db, appId, collection, doc, setDoc, onSnapshot, addDoc, updateDoc, deleteDoc, writeBatch, signInAnonymously, onAuthStateChanged };
            }
        } catch (error) {
            window.fbError = "初始化失敗: " + error.message;
            console.error("Firebase 初始化失敗:", error);
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                ShoppingCart: <path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7M2 7v11a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7M2 7h20M16 11a4 4 0 0 1-8 0" />,
                CheckCircle: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></>,
                Clock: <><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></>,
                Trash2: <><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></>,
                DollarSign: <><line x1="12" y1="1" x2="12" y2="23" /><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" /></>,
                Plus: <><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></>,
                LayoutDashboard: <><rect width="7" height="9" x="3" y="3" rx="1" /><rect width="7" height="5" x="14" y="3" rx="1" /><rect width="7" height="9" x="14" y="12" rx="1" /><rect width="7" height="5" x="3" y="16" rx="1" /></>,
                ChevronLeft: <polyline points="15 18 9 12 15 6" />,
                Timer: <><line x1="10" y1="2" x2="14" y2="2" /><line x1="12" y1="14" x2="15" y2="11" /><circle cx="12" cy="14" r="8" /></>,
                AlertCircle: <><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></>,
                Camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" /><circle cx="12" cy="13" r="3" /></>,
                Upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></>,
                Loader2: <path d="M21 12a9 9 0 1 1-6.219-8.56" />,
                ListChecks: <><path d="m3 17 2 2 4-4" /><path d="m3 7 2 2 4-4" /><path d="M13 6h8" /><path d="M13 12h8" /><path d="M13 18h8" /></>,
                Utensils: <><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2" /><path d="M7 2v20" /><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" /></>,
                Coffee: <><path d="M17 8h1a4 4 0 1 1 0 8h-1" /><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z" /><line x1="6" y1="2" x2="6" y2="4" /><line x1="10" y1="2" x2="10" y2="4" /><line x1="14" y1="2" x2="14" y2="4" /></>,
                RefreshCw: <><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" /><path d="M21 3v5h-5" /><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" /><path d="M3 21v-5h5" /></>,
                Printer: <><polyline points="6 9 6 2 18 2 18 9" /><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" /><rect width="12" height="8" x="6" y="14" /></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [settings, setSettings] = useState({ deadline: null });
            const [bentoImage, setBentoImage] = useState(null);
            const [drinkImage, setDrinkImage] = useState(null);
            const [view, setView] = useState('order'); 
            const [adminTab, setAdminTab] = useState('orders');
            const [loading, setLoading] = useState(true);
            const [initError, setInitError] = useState(window.fbError || null);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [message, setMessage] = useState(null);

            const [customerName, setCustomerName] = useState('');
            const [bentoName, setBentoName] = useState('');
            const [bentoPrice, setBentoPrice] = useState('');
            const [drinkName, setDrinkName] = useState('');
            const [drinkPrice, setDrinkPrice] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [uploadingType, setUploadingType] = useState(null);
            const [deadlineInput, setDeadlineInput] = useState('');

            const bentoInputRef = useRef(null);
            const drinkInputRef = useRef(null);

            const showMsg = (text, type = 'success') => {
                setMessage({ text, type });
                setTimeout(() => setMessage(null), 3000);
            };

            useEffect(() => {
                const checkFB = setInterval(() => {
                    if (window.fb) {
                        clearInterval(checkFB);
                        const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                        signInAnonymously(auth).catch((err) => {
                            setInitError("認證失敗：" + err.message);
                        });
                        onAuthStateChanged(auth, setUser);
                    } else if (window.fbError) {
                        clearInterval(checkFB);
                        setInitError(window.fbError);
                        setLoading(false);
                    }
                }, 200);
                return () => clearInterval(checkFB);
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, appId, collection, doc, onSnapshot } = window.fb;

                const unsubOrders = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), (s) => {
                    setOrders(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubSettings = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), (s) => {
                    if (s.exists()) setSettings(s.data());
                });
                const unsubBentoImg = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'bento_menu'), (s) => {
                    if (s.exists()) setBentoImage(s.data().image);
                });
                const unsubDrinkImg = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'drink_menu'), (s) => {
                    if (s.exists()) setDrinkImage(s.data().image);
                    setLoading(false);
                });
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => { unsubOrders(); unsubSettings(); unsubBentoImg(); unsubDrinkImg(); clearInterval(timer); };
            }, [user]);

            const isDeadlinePassed = useMemo(() => {
                if (!settings.deadline) return false;
                const d = new Date(settings.deadline);
                return d.toDateString() === currentTime.toDateString() && currentTime.getTime() > settings.deadline;
            }, [settings.deadline, currentTime]);

            const timeLeft = useMemo(() => {
                if (!settings.deadline || isDeadlinePassed || new Date(settings.deadline).toDateString() !== currentTime.toDateString()) return null;
                const diff = settings.deadline - currentTime.getTime();
                return `${Math.floor(diff / 60000)}:${Math.floor((diff % 60000) / 1000).toString().padStart(2, '0')}`;
            }, [settings.deadline, currentTime, isDeadlinePassed]);

            const handleUpload = async (e, type) => {
                const file = e.target.files[0];
                if (!file || !window.fb) return;
                setUploadingType(type);
                try {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = async (ev) => {
                        const img = new Image();
                        img.src = ev.target.result;
                        img.onload = async () => {
                            const canvas = document.createElement('canvas');
                            let w = img.width, h = img.height;
                            if (w > 1000) { h = (1000/w)*h; w = 1000; }
                            canvas.width = w; canvas.height = h;
                            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                            const compressed = canvas.toDataURL('image/jpeg', 0.5);
                            await window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'settings', type === 'bento' ? 'bento_menu' : 'drink_menu'), { image: compressed, updatedAt: Date.now() });
                            showMsg("菜單上傳成功！");
                            setUploadingType(null);
                        };
                    };
                } catch { setUploadingType(null); showMsg("上傳失敗", 'error'); }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (isDeadlinePassed) return showMsg("截止囉", 'error');
                if (!customerName || (!bentoName && !drinkName)) return showMsg("未填寫內容", 'error');
                setIsSubmitting(true);
                try {
                    await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'orders'), {
                        name: customerName, bento: bentoName, bentoPrice: Number(bentoPrice)||0,
                        drink: drinkName, drinkPrice: Number(drinkPrice)||0, total: (Number(bentoPrice)||0)+(Number(drinkPrice)||0),
                        paid: false, timestamp: Date.now()
                    });
                    setBentoName(''); setBentoPrice(''); setDrinkName(''); setDrinkPrice(''); showMsg("訂購成功！");
                } catch { showMsg("下單失敗", 'error'); }
                setIsSubmitting(false);
            };

            const stats = useMemo(() => {
                let bt = 0, dt = 0, ps = 0;
                const bc = {}, dc = {};
                orders.forEach(o => {
                    bt += (o.bentoPrice || 0); dt += (o.drinkPrice || 0);
                    if (o.paid) ps += (o.total || 0);
                    if (o.bento) bc[o.bento] = (bc[o.bento] || 0) + 1;
                    if (o.drink) dc[o.drink] = (dc[o.drink] || 0) + 1;
                });
                return { bt, dt, ot: bt + dt, ps, bc, dc };
            }, [orders]);

            if (initError) return (
                <div className="h-screen p-6 flex flex-col items-center justify-center text-center bg-red-50">
                    <Icon name="AlertCircle" size={50} className="text-red-500 mb-4" />
                    <h1 className="text-xl font-black text-red-900 mb-4">系統連接異常</h1>
                    <div className="bg-white p-6 rounded-2xl shadow-lg border border-red-100 max-w-md w-full text-slate-600 text-sm leading-relaxed">
                        <p className="font-bold text-red-600 mb-3 break-words">{initError}</p>
                    </div>
                    <button onClick={() => location.reload()} className="mt-6 bg-red-600 text-white px-8 py-3 rounded-xl font-bold">重新連線</button>
                </div>
            );

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center font-bold text-slate-400 gap-4">
                    <div className="w-10 h-10 border-4 border-slate-200 border-t-orange-500 rounded-full loading-spinner"></div>
                    正在同步雲端資料...
                </div>
            );

            return (
                <div className="min-h-screen pb-20 bg-slate-50">
                    {message && (
                        <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-2xl shadow-2xl font-bold flex items-center gap-2 bg-slate-900 text-white animate-bounce">
                            <Icon name={message.type === 'error' ? "AlertCircle" : "CheckCircle"} size={18}/>
                            {message.text}
                        </div>
                    )}

                    <header className="bg-white border-b sticky top-0 z-30 shadow-sm px-4 h-16 flex items-center justify-between no-print">
                        <div className="flex items-center gap-2">
                            <div className="bg-orange-500 p-2 rounded-xl text-white"><Icon name="ShoppingCart" /></div>
                            <span className="font-black text-xl tracking-tight">訂餐小幫手</span>
                        </div>
                        <button onClick={() => setView(view === 'order' ? 'admin' : 'order')} className="bg-slate-100 px-5 py-2.5 rounded-full text-sm font-bold flex items-center gap-2 transition-all hover:bg-slate-200">
                            {view === 'order' ? <><Icon name="LayoutDashboard" size={16}/> 管理</> : <><Icon name="ChevronLeft" size={16}/> 返回</>}
                        </button>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 mt-4 space-y-8">
                        {view === 'order' ? (
                            <>
                                {timeLeft && <div className="bg-orange-50 border border-orange-100 p-4 rounded-3xl flex items-center justify-center gap-3 text-orange-700 font-bold no-print"><Icon name="Timer" className="animate-pulse" />截止倒數：<span className="text-xl font-black">{timeLeft}</span></div>}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 no-print">
                                    <div className="bg-white p-2 rounded-3xl border shadow-sm text-center">
                                        <div className="text-orange-600 font-black text-xs py-2 uppercase tracking-widest">🍱 便當</div>
                                        {bentoImage ? <img src={bentoImage} className="w-full rounded-2xl border" /> : <div className="py-20 text-slate-300 italic text-xs">主揪尚未上傳照片</div>}
                                    </div>
                                    <div className="bg-white p-2 rounded-3xl border shadow-sm text-center">
                                        <div className="text-teal-600 font-black text-xs py-2 uppercase tracking-widest">🥤 飲料</div>
                                        {drinkImage ? <img src={drinkImage} className="w-full rounded-2xl border" /> : <div className="py-20 text-slate-300 italic text-xs">主揪尚未上傳照片</div>}
                                    </div>
                                </div>
                                <section className={`bg-white p-8 rounded-[2rem] shadow-xl border no-print ${isDeadlinePassed ? 'opacity-60 grayscale border-red-100' : 'border-white'}`}>
                                    <h2 className="text-xl font-black mb-8 flex items-center gap-2 text-slate-800">
                                        <Icon name={isDeadlinePassed ? "AlertCircle" : "Plus"} className={isDeadlinePassed ? "text-red-500" : "text-orange-500"}/>
                                        {isDeadlinePassed ? "今日訂餐已截止" : "填寫訂單"}
                                    </h2>
                                    <form onSubmit={handleSubmit} className="space-y-8">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase ml-4">您的姓名</label>
                                            <input disabled={isDeadlinePassed} required value={customerName} onChange={e => setCustomerName(e.target.value)} placeholder="您的姓名" className="w-full text-2xl font-black bg-slate-50 rounded-2xl px-6 py-5 outline-none focus:ring-4 focus:ring-orange-100 transition-all"/>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <div className="space-y-4">
                                                <h3 className="font-black text-orange-600 text-sm flex items-center gap-2"><Icon name="Utensils" size={16}/> 便當</h3>
                                                <input disabled={isDeadlinePassed} value={bentoName} onChange={e => setBentoName(e.target.value)} placeholder="品項" className="w-full bg-slate-50 rounded-xl px-5 py-4 outline-none font-bold border-2 border-transparent focus:border-orange-200"/>
                                                <input type="number" disabled={isDeadlinePassed} value={bentoPrice} onChange={e => setBentoPrice(e.target.value)} placeholder="金額" className="w-full bg-slate-50 rounded-xl px-5 py-4 outline-none font-black"/>
                                            </div>
                                            <div className="space-y-4">
                                                <h3 className="font-black text-teal-600 text-sm flex items-center gap-2"><Icon name="Coffee" size={16}/> 飲料</h3>
                                                <input disabled={isDeadlinePassed} value={drinkName} onChange={e => setDrinkName(e.target.value)} placeholder="品項/甜冰" className="w-full bg-slate-50 rounded-xl px-5 py-4 outline-none font-bold border-2 border-transparent focus:border-teal-200"/>
                                                <input type="number" disabled={isDeadlinePassed} value={drinkPrice} onChange={e => setDrinkPrice(e.target.value)} placeholder="金額" className="w-full bg-slate-50 rounded-xl px-5 py-4 outline-none font-black"/>
                                            </div>
                                        </div>
                                        <button disabled={isDeadlinePassed || isSubmitting} className="w-full bg-slate-900 text-white py-6 rounded-2xl font-black text-xl shadow-xl active:scale-95 disabled:bg-slate-300">
                                            {isDeadlinePassed ? "截止中" : isSubmitting ? "送出中" : "確認下單"}
                                        </button>
                                    </form>
                                </section>
                                <section className="bg-white p-8 rounded-[2rem] border shadow-sm space-y-6 no-print">
                                    <h2 className="text-xl font-black flex items-center gap-2 text-slate-700"><Icon name="ListChecks" className="text-green-500" /> 付款進度</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {orders.map(o => (
                                            <div key={o.id} className={`p-5 rounded-2xl border flex items-center justify-between transition-all ${o.paid ? 'bg-green-50 border-green-100' : 'bg-slate-50 border-slate-100'}`}>
                                                <div className="min-w-0 pr-2">
                                                    <div className="font-black truncate text-slate-800">{o.name}</div>
                                                    <div className="text-[10px] text-slate-500 truncate">{o.bento} / {o.drink}</div>
                                                    <div className="text-xs font-bold text-slate-600 mt-1">${o.total}</div>
                                                </div>
                                                <button onClick={async () => {
                                                    await window.fb.updateDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'orders', o.id), { paid: !o.paid });
                                                }} className={`px-4 py-2 rounded-xl text-[10px] font-black shadow-sm ${o.paid ? 'bg-green-600 text-white' : 'bg-white text-amber-600 border border-amber-200 hover:bg-amber-50'}`}>
                                                    {o.paid ? '已收' : '付錢'}
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </>
                        ) : (
                            <div className="space-y-6">
                                <div className="flex gap-2 p-1.5 bg-slate-200 rounded-2xl w-fit no-print">
                                    <button onClick={() => setAdminTab('orders')} className={`px-8 py-2.5 rounded-xl text-sm font-black transition-all ${adminTab === 'orders' ? 'bg-white shadow-sm' : 'text-slate-500'}`}>統計彙整</button>
                                    <button onClick={() => setAdminTab('settings')} className={`px-8 py-2.5 rounded-xl text-sm font-black transition-all ${adminTab === 'settings' ? 'bg-white shadow-sm' : 'text-slate-500'}`}>後台設定</button>
                                </div>
                                {adminTab === 'orders' ? (
                                    <div className="space-y-6 printable-area">
                                        {/* 列印抬頭 */}
                                        <div className="print-only text-center border-b-4 border-double border-black pb-4 mb-6">
                                            <h1 className="text-3xl font-black">午餐飲料團購統計清單</h1>
                                            <p className="mt-2 font-bold">列印時間：{new Date().toLocaleString('zh-TW')}</p>
                                        </div>

                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-center font-bold card-grid">
                                            <div className="bg-white p-6 rounded-3xl border shadow-sm text-orange-600">🍱 便當總額<br/>${stats.bt}</div>
                                            <div className="bg-white p-6 rounded-3xl border shadow-sm text-teal-600">🥤 飲料總額<br/>${stats.dt}</div>
                                            <div className="bg-white p-6 rounded-3xl border shadow-sm text-slate-900">💰 應收總計<br/>${stats.ot}</div>
                                            <div className="bg-indigo-600 p-6 rounded-3xl text-white shadow-lg no-print">✅ 實收<br/>${stats.ps}</div>
                                            <div className="print-only bg-white p-6 rounded-3xl border border-black text-black">✅ 已實收<br/>${stats.ps}</div>
                                        </div>

                                        <div className="flex justify-between items-center no-print">
                                            <button onClick={() => window.print()} className="bg-indigo-600 text-white px-6 py-2 rounded-full font-bold flex items-center gap-2 shadow-md hover:bg-indigo-700 transition-all">
                                                <Icon name="Printer" size={18} /> 列印統計清單
                                            </button>
                                            <button onClick={async () => {
                                                if (!confirm("確定重置嗎？")) return;
                                                const { db, appId, doc, writeBatch } = window.fb;
                                                const batch = writeBatch(db);
                                                orders.forEach(o => batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'orders', o.id)));
                                                await batch.commit();
                                                showMsg("已重置");
                                            }} className="text-red-500 text-xs font-bold flex items-center gap-1 hover:underline"><Icon name="RefreshCw" size={14}/> 重置今日資料</button>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 card-grid">
                                            <div className="bg-white p-6 rounded-3xl border shadow-sm">
                                                <h4 className="font-black mb-4 text-orange-600 flex items-center gap-2"><Icon name="Utensils" size={18}/> 便當清單統計</h4>
                                                {Object.entries(stats.bc).map(([n,c]) => <div key={n} className="flex justify-between py-2 border-b border-slate-100 text-sm font-bold"><span>{n}</span><span>{c} 份</span></div>)}
                                            </div>
                                            <div className="bg-white p-6 rounded-3xl border shadow-sm">
                                                <h4 className="font-black mb-4 text-teal-600 flex items-center gap-2"><Icon name="Coffee" size={18}/> 飲料清單統計</h4>
                                                {Object.entries(stats.dc).map(([n,c]) => <div key={n} className="flex justify-between py-2 border-b border-slate-100 text-sm font-bold"><span>{n}</span><span>{c} 杯</span></div>)}
                                            </div>
                                        </div>

                                        <div className="bg-white rounded-3xl border overflow-hidden shadow-sm">
                                            <div className="bg-slate-50 px-6 py-3 font-black text-xs text-slate-400 uppercase tracking-widest no-print">訂單詳細列表</div>
                                            <table className="w-full text-left text-sm">
                                                <thead className="bg-slate-50 border-b font-black text-[10px] text-slate-400">
                                                    <tr>
                                                        <th className="px-6 py-4">姓名</th>
                                                        <th className="px-6 py-4">便當</th>
                                                        <th className="px-6 py-4">飲料</th>
                                                        <th className="px-6 py-4">金額</th>
                                                        <th className="px-6 py-4">付款狀態</th>
                                                        <th className="px-6 py-4 text-right no-print">操作</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {orders.map(o => (
                                                        <tr key={o.id} className="border-b border-slate-50 hover:bg-slate-50/50">
                                                            <td className="px-6 py-4 font-bold">{o.name}</td>
                                                            <td className="px-6 py-4 text-slate-500">{o.bento || '-'}</td>
                                                            <td className="px-6 py-4 text-slate-500">{o.drink || '-'}</td>
                                                            <td className="px-6 py-4 font-bold">${o.total}</td>
                                                            <td className="px-6 py-4">
                                                                <span className={o.paid ? "text-green-600 font-bold" : "text-red-500 font-bold"}>
                                                                    {o.paid ? "已付" : "未付"}
                                                                </span>
                                                            </td>
                                                            <td className="px-6 py-4 text-right no-print">
                                                                <button onClick={async () => { if(confirm("確定刪除？")) await window.fb.deleteDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'orders', o.id)); }} className="text-slate-200 hover:text-red-500 transition-colors">
                                                                    <Icon name="Trash2" size={16}/>
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-6 no-print">
                                        <div className="bg-white p-8 rounded-[2rem] border shadow-sm">
                                            <h3 className="font-black text-lg mb-6 flex items-center gap-2"><Icon name="Timer" /> 截止時間設定</h3>
                                            <div className="flex gap-2">
                                                <input type="time" value={deadlineInput} onChange={e => setDeadlineInput(e.target.value)} className="bg-slate-50 border-none rounded-2xl px-6 py-4 font-black text-xl outline-none flex-1 focus:ring-4 focus:ring-orange-100 transition-all"/>
                                                <button onClick={async () => {
                                                    if (!deadlineInput) return;
                                                    const [h,m] = deadlineInput.split(':');
                                                    const d = new Date(); d.setHours(parseInt(h), parseInt(m), 0, 0);
                                                    await window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'settings', 'config'), { deadline: d.getTime() });
                                                    showMsg("截止時間已設定");
                                                }} className="bg-orange-500 text-white px-8 py-4 rounded-2xl font-black shadow-lg">設定</button>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="bg-white p-8 rounded-[2rem] text-center border shadow-sm space-y-4">
                                                <h3 className="font-black text-orange-600 flex items-center justify-center gap-2"><Icon name="Camera" /> 便當菜單照片</h3>
                                                <input type="file" className="hidden" ref={bentoInputRef} onChange={e => handleUpload(e, 'bento')} />
                                                <button disabled={uploadingType==='bento'} onClick={() => bentoInputRef.current.click()} className="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black">更換照片</button>
                                            </div>
                                            <div className="bg-white p-8 rounded-[2rem] text-center border shadow-sm space-y-4">
                                                <h3 className="font-black text-teal-600 flex items-center justify-center gap-2"><Icon name="Camera" /> 飲料菜單照片</h3>
                                                <input type="file" className="hidden" ref={drinkInputRef} onChange={e => handleUpload(e, 'drink')} />
                                                <button disabled={uploadingType==='drink'} onClick={() => drinkInputRef.current.click()} className="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black">更換照片</button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
